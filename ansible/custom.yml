---
# ansible/custom.yml
# Add only the items you need with *_extra variables.
# This file is loaded before roles in ansible/site.yml.
# Each *_extra list is appended to role defaults (not replaced).

# Optional CLI tools
homebrew_packages_extra:
  - git
  - curl
  - lcov
  - jq
  - tree
  - hadolint

# Optional GUI applications
homebrew_cask_apps_extra:
  - docker
  - wezterm
  - google-chrome
  - font-fira-code-nerd-font
  - android-studio

# Optional mise plugins/toolchains
mise_plugins_extra:
  - flutter

mise_toolchains_extra:
  - node@latest
  - python@latest
  - java@latest
  - gradle@latest
  - flutter@latest

# Optional VS Code extensions
vscode_extensions_list_extra:
  - EditorConfig.EditorConfig
  - oderwat.indent-rainbow
  - esbenp.prettier-vscode
  - dbaeumer.vscode-eslint
  - ms-python.python
  - ms-python.vscode-pylance
  - Dart-Code.dart-code
  - Dart-Code.flutter
  - fwcd.kotlin
  - swiftlang.swift-vscode
  - vscjava.vscode-java-pack
  - vscjava.vscode-gradle
  - vmware.vscode-spring-boot
  - redhat.vscode-yaml
  - redhat.vscode-xml

# Optional Dock items
macos_dock_apps_extra:
  - /System/Applications/Apps.app
  - /System/Applications/System Settings.app
  - /System/Applications/Passwords.app
  - /System/Applications/Calendar.app
  - /System/Applications/Mail.app
  - /System/Applications/App Store.app
  - /Applications/Safari.app

# Optional XDG normalize additions (examples)
