---
# ansible/roles/xdg_normalize/tasks/main.yml
# Normalize non-XDG directories under XDG paths

- name: Create XDG directories
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/{{ item }}"
    state: directory
    mode: '0755'
  loop: "{{ xdg_normalize_directories + (custom.xdg_normalize_directories_extra | default([])) }}"

- name: Move legacy directories under XDG
  shell: |
    set -eu
    legacy="{{ ansible_facts['env']['HOME'] }}/{{ item.legacy }}"
    target="{{ ansible_facts['env']['HOME'] }}/{{ item.target }}"
    changed=0

    if [ -L "$legacy" ]; then
      rm -f "$legacy"
      changed=1
    elif [ -d "$legacy" ]; then
      if [ -n "$(ls -A "$legacy" 2>/dev/null)" ]; then
        cp -a "$legacy"/. "$target"/
      fi
      rm -rf "$legacy"
      changed=1
    fi

    if [ "$changed" -eq 1 ]; then
      exit 3
    fi
  args:
    executable: /bin/bash
  loop: "{{ xdg_normalize_directory_migrations + (custom.xdg_normalize_directory_migrations_extra | default([])) }}"
  loop_control:
    label: "{{ item.legacy }} -> {{ item.target }}"
  register: xdg_normalize_migrate_dirs
  changed_when: xdg_normalize_migrate_dirs.rc == 3
  failed_when: xdg_normalize_migrate_dirs.rc not in [0, 3]

- name: Move legacy files under XDG
  shell: |
    set -eu
    legacy="{{ ansible_facts['env']['HOME'] }}/{{ item.legacy }}"
    target="{{ ansible_facts['env']['HOME'] }}/{{ item.target }}"
    changed=0

    if [ -L "$legacy" ]; then
      rm -f "$legacy"
      changed=1
    elif [ -f "$legacy" ]; then
      cp -a "$legacy" "$target"
      rm -f "$legacy"
      changed=1
    fi

    if [ "$changed" -eq 1 ]; then
      exit 3
    fi
  args:
    executable: /bin/bash
  loop: "{{ xdg_normalize_file_migrations + (custom.xdg_normalize_file_migrations_extra | default([])) }}"
  loop_control:
    label: "{{ item.legacy }} -> {{ item.target }}"
  register: xdg_normalize_migrate_files
  changed_when: xdg_normalize_migrate_files.rc == 3
  failed_when: xdg_normalize_migrate_files.rc not in [0, 3]

- name: Move zsh config files under XDG
  shell: |
    set -eu
    legacy_base="{{ ansible_facts['env']['HOME'] }}"
    target_dir="{{ ansible_facts['env']['HOME'] }}/.config/zsh"

    mkdir -p "$target_dir"

    for f in {{ (xdg_normalize_zsh_config_files + (custom.xdg_normalize_zsh_config_files_extra | default([]))) | join(' ') }}; do
      legacy="$legacy_base/$f"
      target="$target_dir/$f"
      if [ -L "$legacy" ]; then
        rm -f "$legacy"
        echo "removed_legacy_symlink:$f"
      elif [ -f "$legacy" ]; then
        cp -a "$legacy" "$target"
        rm -f "$legacy"
        echo "migrated:$f"
      fi
    done
  args:
    executable: /bin/bash
  register: migrate_zsh_configs
  changed_when: migrate_zsh_configs.stdout != ''

- name: Move zsh compdump files under ZDOTDIR (XDG config)
  shell: |
    set -eu
    home="{{ ansible_facts['env']['HOME'] }}"
    legacy_pattern="$home/.zcompdump*"
    target_dir="$home/.config/zsh"

    mkdir -p "$target_dir"

    shopt -s nullglob
    for f in $legacy_pattern; do
      if [ -L "$f" ]; then
        rm -f "$f"
        echo removed_legacy_symlink:$(basename "$f")
      elif [ -f "$f" ]; then
        cp -a "$f" "$target_dir/"
        rm -f "$f"
        echo migrated:$(basename "$f")
      fi
    done
  args:
    executable: /bin/bash
  register: migrate_zsh_compdump
  changed_when: migrate_zsh_compdump.stdout != ''
