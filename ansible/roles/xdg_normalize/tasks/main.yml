- name: Move zsh config files under XDG
  shell: |
    set -eu
    legacy_base="{{ ansible_facts['env']['HOME'] }}"
    target_dir="{{ ansible_facts['env']['HOME'] }}/.config/zsh"

    mkdir -p "$target_dir"

    for f in .zshrc .zprofile .zlogin .zlogout; do
      legacy="$legacy_base/$f"
      target="$target_dir/$f"
      if [ -L "$legacy" ]; then
        rm -f "$legacy"
        echo "removed_legacy_symlink:$f"
      elif [ -f "$legacy" ]; then
        cp -a "$legacy" "$target"
        rm -f "$legacy"
        echo "migrated:$f"
      fi
    done
  args:
    executable: /bin/bash
  register: migrate_zsh_configs
  changed_when: migrate_zsh_configs.stdout != ''

