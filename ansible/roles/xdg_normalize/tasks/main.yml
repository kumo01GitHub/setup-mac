- name: Move zsh compdump files under ZDOTDIR (XDG config)
  shell: |
    set -eu
    home="{{ ansible_facts['env']['HOME'] }}"
    legacy_pattern="$home/.zcompdump*"
    target_dir="$home/.config/zsh"

    mkdir -p "$target_dir"

    shopt -s nullglob
    for f in $legacy_pattern; do
      if [ -L "$f" ]; then
        rm -f "$f"
        echo removed_legacy_symlink:$(basename "$f")
      elif [ -f "$f" ]; then
        cp -a "$f" "$target_dir/"
        rm -f "$f"
        echo migrated:$(basename "$f")
      fi
    done
  args:
    executable: /bin/bash
  register: migrate_zsh_compdump
  changed_when: migrate_zsh_compdump.stdout != ''

