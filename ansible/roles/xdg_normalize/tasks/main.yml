  shell: |
    set -eu
    legacy="{{ ansible_facts['env']['HOME'] }}/.zsh_history"
    target_dir="{{ ansible_facts['env']['HOME'] }}/.local/state/zsh"
    target="$target_dir/history"

    mkdir -p "$target_dir"

    if [ -L "$legacy" ]; then
