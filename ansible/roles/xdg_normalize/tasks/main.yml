---
# ansible/roles/xdg_normalize/tasks/main.yml
# XDG非準拠で作成されたディレクトリをXDG配下へ正規化

- name: XDG用ディレクトリを作成
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - .config
    - .cache
    - .local
    - .local/share
    - .local/state
    - .cache/ansible
    - .cache/ansible/tmp
    - .cache/Homebrew
    - .cache/mise
    - .cache/npm
    - .cache/pip
    - .cache/python
    - .cache/python/pycache
    - .cache/gem
    - .cache/gem/specs
    - .config/docker
    - .config/mise
    - .config/npm
    - .config/pip
    - .local/state/Homebrew
    - .local/state/Homebrew/logs
    - .local/share/ansible
    - .local/share/android
    - .local/share/cocoapods
    - .local/share/gradle
    - .local/share/mise
    - .local/share/npm
    - .local/share/vscode
    - .local/share/vscode/user-data
    - .local/share/vscode/extensions

- name: HomebrewキャッシュをXDG配下へ移設
  shell: |
    set -eu
    legacy="{{ ansible_facts['env']['HOME'] }}/Library/Caches/Homebrew"
    target="{{ ansible_facts['env']['HOME'] }}/.cache/Homebrew"

    if [ -L "$legacy" ]; then
      rm -f "$legacy"
      echo removed_legacy_symlink
    elif [ -d "$legacy" ]; then
      if [ -n "$(ls -A "$legacy" 2>/dev/null)" ]; then
        cp -a "$legacy"/. "$target"/
      fi
      rm -rf "$legacy"
      echo migrated
    fi
  args:
    executable: /bin/bash
  register: migrate_homebrew_cache
  changed_when: "'migrated' in migrate_homebrew_cache.stdout or 'removed_legacy_symlink' in migrate_homebrew_cache.stdout"

