---
# ansible/roles/mise_init/tasks/main.yml
# mise初期化とRuby/CocoaPodsセットアップ

- name: miseが利用可能か確認
  command: /opt/homebrew/bin/mise --version
  changed_when: false

- name: miseでRubyをインストールしてグローバル利用に設定
  shell: |
    set -eu
    export MISE_DATA_DIR="{{ ansible_facts['env']['HOME'] }}/.local/share/mise"
    export MISE_CACHE_DIR="{{ ansible_facts['env']['HOME'] }}/.cache/mise"
    export MISE_CONFIG_DIR="{{ ansible_facts['env']['HOME'] }}/.config/mise"

    mkdir -p "$MISE_DATA_DIR" "$MISE_CACHE_DIR" "$MISE_CONFIG_DIR"

    if ! /opt/homebrew/bin/mise where ruby@latest >/dev/null 2>&1; then
      /opt/homebrew/bin/mise install ruby@latest
      echo installed_ruby
    fi

    /opt/homebrew/bin/mise use -g ruby@latest >/dev/null
  args:
    executable: /bin/bash
  register: ruby_mise_setup
  changed_when: "'installed_ruby' in ruby_mise_setup.stdout"

