---
# ansible/roles/homebrew/defaults/main.yml

# Required packages for this playbook and dotfiles to work as intended.
# - dotfiles dependency: bat, eza, starship, delta, sheldon
# - role dependency: dockutil (macos role), mise (mise role), ansible (self-management)
homebrew_packages:
  - bat
  - dockutil
  - eza
  - ansible
  - starship
  - mise
  - delta
  - sheldon

# Required app for vscode_extensions role (`code` CLI detection fallback).
homebrew_cask_apps:
  - visual-studio-code
