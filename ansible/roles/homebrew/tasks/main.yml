---
# ansible/roles/homebrew/tasks/main.yml
# Install Homebrew packages

- name: Check Homebrew availability
  command: which brew
  register: brew_check
  ignore_errors: true
  changed_when: false

- name: Fail if Homebrew is not installed
  fail:
    msg: |
      Homebrew was not found.
      The official Homebrew installer requires interactive sudo input and may fail within Ansible, so please install it manually first.

      Command to run:
      /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  when: brew_check.rc != 0

- name: Install Homebrew packages
  homebrew:
    name: "{{ item }}"
    state: present
    path: /opt/homebrew/bin
  loop: "{{ homebrew_packages }}"

- name: Create Docker cask directories
  become: true
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_facts['user_id'] }}"
    group: staff
    mode: '0755'
  loop: "{{ homebrew_docker_cask_directories }}"

- name: Install Homebrew cask apps
  homebrew_cask:
    name: "{{ item }}"
    state: present
  loop: "{{ homebrew_cask_apps }}"
